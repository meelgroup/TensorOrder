name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install ruff
      - run: ruff check src/   # or adjust to the actual source path

  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Cython extensions
        run: |
          python setup.py build_ext --inplace

      - name: Run smoke test (numpy backend)
        run: |
          python src/tensororder.py --planner="line-Flow" \
            --weights="unweighted" \
            --tensor_library="numpy" \
            < benchmarks/cubic_vertex_cover/cubic_vc_50_0.cnf

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build CPU Docker image
        run: docker build --tag tensororder:ci -f Dockerfile .

      - name: Smoke test inside container
        run: |
          docker run -i tensororder:ci python /src/tensororder.py \
            --planner="line-Flow" --weights="unweighted" \
            < benchmarks/cubic_vertex_cover/cubic_vc_50_0.cnf

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit bandit
      - run: pip-audit -r requirements.txt
      - run: bandit -r src/ --skip B101  # B101 = assert statements (common in research code)